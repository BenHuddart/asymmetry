name: Docs Build and Deploy

on:
  # Build on PRs (covers every branch via its PR) and on pushes to main
  # (which also performs the Pages deploy). Avoids the duplicate build that
  # fired when both push:"**" and pull_request:"**" matched the same PR branch.
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  # Required to delete the github-pages artifact once it has been deployed.
  actions: write

concurrency:
  group: docs-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docs:
    name: Build Sphinx docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints.txt -e .
          pip install -c constraints.txt -r docs/requirements.txt

      - name: Install offscreen-Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libxkbcommon0 libdbus-1-3 fonts-dejavu-core

      - name: Generate GUI screenshots
        continue-on-error: true
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m docs.screenshots.capture --out docs/_generated/screenshots

      - name: Build HTML docs
        run: sphinx-build -b html docs docs/_build/html

      - name: Disable Jekyll processing
        run: touch docs/_build/html/.nojekyll

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_build/html

  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5

      # The Pages deploy has consumed the artifact; delete it so it does not sit
      # in the run's storage for the default retention period. Runs even if the
      # deploy step failed, since the artifact exists either way.
      - name: Delete github-pages artifact
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              { owner, repo, run_id: context.runId },
            );
            for (const artifact of artifacts) {
              if (artifact.name === 'github-pages') {
                await github.rest.actions.deleteArtifact({
                  owner,
                  repo,
                  artifact_id: artifact.id,
                });
                core.info(`Deleted artifact ${artifact.name} (id ${artifact.id})`);
              }
            }
