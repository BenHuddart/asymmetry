name: Docs Build and Deploy

on:
  # Full generation + Pages deploy happens for releases (version tags) and for
  # pushes to main that touch the docs or the GUI code (screenshots are captured
  # from the live GUI, so `src/**` changes can alter the published images). The
  # `paths` filter is not evaluated for tag pushes, so releases always deploy.
  push:
    tags:
      - "v*"
    branches:
      - main
    paths:
      - "docs/**"
      - "src/**"
      - ".github/workflows/docs-pages.yml"
  # On pull requests we run a cheap build-only smoke (no screenshots, no deploy)
  # so a Sphinx-breaking docs change is still caught before merge. Scoped to
  # docs-affecting paths so ordinary code PRs don't pay any docs cost.
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

# Least privilege at the top level: the cheap PR smoke and the release build only
# read the repo. The Pages write / id-token / artifact-delete permissions are
# granted narrowly to the deploy job below, so PR-triggered code never holds them.
permissions:
  contents: read

# Per-ref build concurrency: a superseded build for the same ref (e.g. two quick
# merges to main, or a force-pushed PR) is cancelled rather than queued. The
# deploy job additionally serializes under the shared `pages` group below, per
# GitHub's recommended pattern, so an in-flight Pages deploy is never cancelled.
concurrency:
  group: docs-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Cheap PR gate: confirm the docs still build. No screenshot capture (the slow,
  # offscreen-Qt part) and no Pages artifact/deploy — just `sphinx-build`.
  docs-smoke:
    name: Docs build smoke (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints.txt -e .
          pip install -c constraints.txt -r docs/requirements.txt

      - name: Check screenshot references
        # Static consistency gate: every `/_generated/screenshots/<name>.png`
        # referenced from the .rst sources must map to a registered scenario,
        # and every scenario must be referenced somewhere (an unused scenario
        # still costs capture time on every full build).
        run: python -m docs.screenshots.capture --check-refs

      - name: Build HTML docs (no screenshots)
        # Screenshots are not generated here; pages that embed generated images
        # tolerate their absence. -W would turn missing-image warnings into
        # errors, so we keep the smoke as a plain build (broken rST/refs still
        # fail the build).
        run: sphinx-build -d docs/_build/doctrees -b html docs docs/_build/html

  # Full build: regenerate GUI screenshots, build HTML, and (below) deploy to
  # Pages. Runs on a version tag push, a docs/src push to main, or a manual
  # dispatch.
  build-docs:
    name: Build Sphinx docs
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    # Outer guard: the in-process screenshot watchdog (faulthandler, ~8 min) and
    # the step timeout below should both fire first; this bounds the whole job in
    # case anything upstream/downstream of screenshots wedges too.
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints.txt -e .
          pip install -c constraints.txt -r docs/requirements.txt

      - name: Install offscreen-Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libxkbcommon0 libdbus-1-3 fonts-dejavu-core

      - name: Generate GUI screenshots
        continue-on-error: true
        # Backstop for the in-process faulthandler watchdog: if a fit holds the
        # GIL so hard that even faulthandler cannot fire, GitHub kills the step.
        # continue-on-error keeps the docs build going with whatever was captured.
        timeout-minutes: 12
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m docs.screenshots.capture --out docs/_generated/screenshots

      - name: Build HTML docs
        run: sphinx-build -d docs/_build/doctrees -b html docs docs/_build/html

      - name: Disable Jekyll processing
        run: touch docs/_build/html/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_build/html

  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-docs
    # Deploy for releases (version tag), pushes to main, or a deliberate manual
    # dispatch. Mirrors the `push` trigger above; PR events never reach here
    # because build-docs is skipped for them.
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      github.ref == 'refs/heads/main' ||
      github.event_name == 'workflow_dispatch'
    # One Pages deploy at a time, never cancelled mid-flight (GitHub's
    # recommended `pages` group): a tag deploy and a main deploy queue behind
    # each other instead of racing or interrupting one another.
    concurrency:
      group: pages
      cancel-in-progress: false
    # The Pages deploy is the only job that needs write scopes: pages/id-token to
    # publish, and actions:write to delete the consumed artifact afterwards.
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5

      # The Pages deploy has consumed the artifact; delete it so it does not sit
      # in the run's storage for the default retention period. Runs even if the
      # deploy step failed, since the artifact exists either way.
      - name: Delete github-pages artifact
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              { owner, repo, run_id: context.runId },
            );
            for (const artifact of artifacts) {
              if (artifact.name === 'github-pages') {
                await github.rest.actions.deleteArtifact({
                  owner,
                  repo,
                  artifact_id: artifact.id,
                });
                core.info(`Deleted artifact ${artifact.name} (id ${artifact.id})`);
              }
            }
