name: CI

on:
  # Run on PRs (covers every feature/topic branch), and on pushes to main
  # (post-merge validation). Avoids the duplicate run that occurred when both
  # push:"**" and pull_request:"**" fired for the same PR branch.
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  # dorny/paths-filter lists changed files via the PR API on pull_request events.
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect whether anything that affects tests changed, so docs-only / metadata
  # PRs can skip the (slow) test matrix while still satisfying the required
  # "CI success" gate below.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'tools/**'
              - 'pyproject.toml'
              - 'constraints.txt'
              - '.github/workflows/ci.yml'

  # Fast lint + structural checks. Always run (cheap, and structural validates
  # repo shape such as the porting policy index, which docs changes can touch).
  checks:
    name: Lint & structural
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints.txt -e ".[dev]"
      - name: Structural checks
        run: python tools/harness.py structural
      - name: Lint
        run: python tools/harness.py lint

  # Standard-tier suite, sharded across parallel runners. The GUI tests each pay
  # a per-test MainWindow construction cost and on a 2-core runner dominate
  # wall-clock (~10 min vs ~2 min for everything else), so they are split into
  # three node-id-hashed shards via the harness `--shard` flag while the fast
  # non-GUI tests stay a single shard. Each shard still runs `-n auto --dist load`
  # within its runner. The four shards together cover exactly the standard tier
  # (non-gui ∪ gui[1/3 ∪ 2/3 ∪ 3/3]); the hash split is stable per node id so the
  # GUI shards are disjoint and complete regardless of per-process test ordering.
  test:
    name: Tests (${{ matrix.label }})
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: non-gui
            args: --subset non-gui
          - label: gui 1/3
            args: --subset gui --shard 1/3
          - label: gui 2/3
            args: --subset gui --shard 2/3
          - label: gui 3/3
            args: --subset gui --shard 3/3
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libegl1
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints.txt -e ".[gui,hdf5,root,dev]"
      - name: Run test suite
        env:
          QT_QPA_PLATFORM: offscreen
        run: python tools/harness.py test --tier standard ${{ matrix.args }}

  # Single required status check that aggregates the checks + test jobs, so the
  # branch ruleset only needs to require this one status. Passes when checks
  # succeeded and tests succeeded (or were skipped for a non-code change).
  ci-success:
    name: CI success
    if: always()
    needs: [changes, checks, test]
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs
        run: |
          echo "changes: ${{ needs.changes.result }}"
          echo "checks:  ${{ needs.checks.result }}"
          echo "test:    ${{ needs.test.result }}"
          # changes must succeed, otherwise 'test' may have been skipped due to an
          # infrastructure failure rather than a legitimate no-code-change PR.
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "::error::Change detection failed"
            exit 1
          fi
          if [ "${{ needs.checks.result }}" != "success" ]; then
            echo "::error::Lint & structural checks failed"
            exit 1
          fi
          # 'skipped' is only legitimate here because change detection succeeded
          # and reported no code changes.
          if [ "${{ needs.test.result }}" != "success" ] && [ "${{ needs.test.result }}" != "skipped" ]; then
            echo "::error::Test suite failed"
            exit 1
          fi
          echo "All required CI jobs passed (tests skipped only for non-code changes)."
