name: CI

on:
  # Run on PRs (covers every feature/topic branch), and on pushes to main
  # (post-merge validation). Avoids the duplicate run that occurred when both
  # push:"**" and pull_request:"**" fired for the same PR branch.
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  harness:
    name: Harness validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libegl1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints.txt -e ".[gui,hdf5,root,dev]"

      - name: Run harness validation
        env:
          QT_QPA_PLATFORM: offscreen
        run: python tools/harness.py validate
