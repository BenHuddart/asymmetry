name: Build and Release Executables

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fail fast if the tag disagrees with the tree it points at, before paying
  # for the platform builds: the tag version must match pyproject.toml (the
  # single source of truth that importlib.metadata reports at runtime), and a
  # stable release must have a rolled CHANGELOG heading. Prerelease tags
  # (containing "-") skip the changelog requirement.
  verify-version:
    name: Verify tag matches version and changelog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Check tag against pyproject.toml and CHANGELOG.md
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          PY_VERSION="$(sed -n 's/^version = "\(.*\)"$/\1/p' pyproject.toml)"
          if [ "${VERSION}" != "${PY_VERSION}" ]; then
            echo "::error::Tag ${TAG} does not match pyproject.toml version" \
              "${PY_VERSION}. Release via the 'Cut release' workflow (or fix" \
              "the tag) so the packaged app reports the version it is labelled with."
            exit 1
          fi
          case "${VERSION}" in
            *-*) echo "Prerelease tag; skipping changelog check." ;;
            *)
              if ! grep -q "^## \[${VERSION}\] " CHANGELOG.md; then
                echo "::error::CHANGELOG.md has no '## [${VERSION}]' heading -" \
                  "the [Unreleased] section was not rolled for this release."
                exit 1
              fi
              ;;
          esac

  build-macos-arm:
    name: Build macOS DMG (arm64)
    runs-on: macos-14
    needs: verify-version
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Extract version
        id: meta
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints.txt -e ".[gui,gle,hdf5,hdf4,root]"
          pip install -c constraints.txt pyinstaller Pillow dmgbuild

      - name: Generate macOS icon (.icns)
        shell: bash
        run: python packaging/macos_icon.py --icns build/icons/Asymmetry.icns

      - name: Build application with PyInstaller
        env:
          PYI_ICON_PATH: ${{ github.workspace }}/build/icons/Asymmetry.icns
        shell: bash
        run: pyinstaller --clean --noconfirm packaging/asymmetry.spec

      - name: Smoke-test packaged app
        shell: bash
        run: |
          test -x dist/Asymmetry.app/Contents/MacOS/Asymmetry
          dist/Asymmetry.app/Contents/MacOS/Asymmetry --smoke-test --smoke-test-root

      - name: Generate DMG background
        shell: bash
        run: python scripts/build_dmg_background.py --output build/dmg-bg.png

      - name: Build DMG
        env:
          ASYMMETRY_APP_BUNDLE: ${{ github.workspace }}/dist/Asymmetry.app
          ASYMMETRY_DMG_BACKGROUND: ${{ github.workspace }}/build/dmg-bg.png
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          DMG_PATH="dist/Asymmetry-${VERSION}-macos-arm64.dmg"

          test -d dist/Asymmetry.app

          rm -f "$DMG_PATH"
          dmgbuild -s packaging/macos/dmg_settings.py "Asymmetry" "$DMG_PATH"

      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: asymmetry-macos-arm64
          path: dist/Asymmetry-${{ steps.meta.outputs.version }}-macos-arm64.dmg
          if-no-files-found: error
          # Build artifacts are only needed long enough for the release job to
          # download them; the "Delete workflow artifacts" step removes them on
          # success, and this caps lingering ones (e.g. if a build succeeds but
          # the release job never runs) instead of the 90-day default.
          retention-days: 1

  build-windows:
    name: Build Windows installer (x64)
    runs-on: windows-2025
    needs: verify-version
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Extract version
        id: meta
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $version = $tag.Substring(1)
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints.txt -e ".[gui,gle,hdf5,hdf4,root]"
          pip install -c constraints.txt pyinstaller Pillow

      - name: Generate Windows icon (.ico)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/icons | Out-Null
          python -c "from PIL import Image; img = Image.open('src/asymmetry/resources/logo_512x512.png'); img.save('build/icons/Asymmetry.ico', sizes=[(16,16),(24,24),(32,32),(48,48),(64,64),(128,128),(256,256)])"

      - name: Stage HDF4 runtime DLLs
        shell: pwsh
        run: python packaging/windows/fetch_hdf4_dlls.py "$env:GITHUB_WORKSPACE\build\hdf4-dlls"

      - name: Build application with PyInstaller
        env:
          PYI_ICON_PATH: ${{ github.workspace }}\build\icons\Asymmetry.ico
          ASYMMETRY_HDF4_DLL_DIR: ${{ github.workspace }}\build\hdf4-dlls
        shell: pwsh
        run: pyinstaller --clean --noconfirm packaging/asymmetry.spec

      - name: Smoke-test packaged app
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\Asymmetry\Asymmetry.exe")) {
            throw "Packaged executable not found at dist\\Asymmetry\\Asymmetry.exe"
          }
          & "dist\Asymmetry\Asymmetry.exe" --smoke-test --smoke-test-root

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y

      - name: Build EXE installer
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.version }}"
          $appDir = "$env:GITHUB_WORKSPACE\dist\Asymmetry"
          $iconFile = "$env:GITHUB_WORKSPACE\build\icons\Asymmetry.ico"
          $outputDir = "$env:GITHUB_WORKSPACE\dist"
          iscc `
            "/DAppVersion=$version" `
            "/DAppDir=$appDir" `
            "/DIconFile=$iconFile" `
            "/DOutputDir=$outputDir" `
            packaging\windows\asymmetry.iss

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: asymmetry-windows-x64
          path: dist/Asymmetry-${{ steps.meta.outputs.version }}-windows-x64-setup.exe
          if-no-files-found: error
          # Build artifacts are only needed long enough for the release job to
          # download them; the "Delete workflow artifacts" step removes them on
          # success, and this caps lingering ones (e.g. if a build succeeds but
          # the release job never runs) instead of the 90-day default.
          retention-days: 1

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-macos-arm
      - build-windows
    permissions:
      actions: write
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.exe

      - name: Delete workflow artifacts
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const run_id = context.runId;
            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              {
                owner,
                repo,
                run_id,
                per_page: 100,
              },
            );

            for (const artifact of artifacts) {
              core.info(`Deleting artifact ${artifact.name} (${artifact.id})`);
              await github.rest.actions.deleteArtifact({
                owner,
                repo,
                artifact_id: artifact.id,
              });
            }
