name: Build and Release Executables

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-macos-intel:
    name: Build macOS DMG (x86_64)
    runs-on: macos-15-intel
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version
        id: meta
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints.txt -e ".[gui,gle,hdf5,root]"
          pip install -c constraints.txt pyinstaller Pillow

      - name: Generate macOS icon (.icns)
        shell: bash
        run: python packaging/macos_icon.py --icns build/icons/Asymmetry.icns

      - name: Build application with PyInstaller
        env:
          PYI_ICON_PATH: ${{ github.workspace }}/build/icons/Asymmetry.icns
        shell: bash
        run: pyinstaller --clean --noconfirm packaging/asymmetry.spec

      - name: Smoke-test packaged app
        shell: bash
        run: |
          test -x dist/Asymmetry.app/Contents/MacOS/Asymmetry
          dist/Asymmetry.app/Contents/MacOS/Asymmetry --smoke-test

      - name: Install DMG packaging tool
        shell: bash
        run: brew install create-dmg

      - name: Build DMG
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          DMG_PATH="dist/Asymmetry-${VERSION}-macos-x86_64.dmg"
          DMG_ROOT="build/dmg-root"
          DMG_BG="build/dmg-bg.png"

          test -d dist/Asymmetry.app

          rm -rf "$DMG_ROOT"
          mkdir -p "$DMG_ROOT"
          cp -R dist/Asymmetry.app "$DMG_ROOT/"

          python - <<'PY'
          import matplotlib
          matplotlib.use("Agg")
          import matplotlib.pyplot as plt

          fig = plt.figure(figsize=(8.0, 4.2), dpi=100)
          ax = fig.add_axes([0, 0, 1, 1])
          ax.set_xlim(0, 1)
          ax.set_ylim(0, 1)
          ax.axis("off")

          fig.patch.set_facecolor("#f6f6f6")
          ax.annotate(
              "",
              xy=(0.72, 0.50),
              xytext=(0.42, 0.50),
              arrowprops={"arrowstyle": "-|>", "lw": 6, "color": "#8a8a8a"},
          )
          ax.text(
              0.57,
              0.62,
              "Drag to Applications",
              ha="center",
              va="center",
              fontsize=15,
              color="#666666",
          )
          fig.savefig("build/dmg-bg.png", dpi=100)
          PY

          rm -f "$DMG_PATH"

          create-dmg \
            --volname "Asymmetry" \
            --background "$DMG_BG" \
            --window-pos 200 120 \
            --window-size 800 420 \
            --icon-size 100 \
            --icon "Asymmetry.app" 220 210 \
            --hide-extension "Asymmetry.app" \
            --app-drop-link 580 210 \
            "$DMG_PATH" \
            "$DMG_ROOT"

      - name: Upload macOS x86_64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: asymmetry-macos-x86_64
          path: dist/Asymmetry-${{ steps.meta.outputs.version }}-macos-x86_64.dmg
          if-no-files-found: error

  build-macos-arm:
    name: Build macOS DMG (arm64)
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version
        id: meta
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints.txt -e ".[gui,gle,hdf5,root]"
          pip install -c constraints.txt pyinstaller Pillow

      - name: Generate macOS icon (.icns)
        shell: bash
        run: python packaging/macos_icon.py --icns build/icons/Asymmetry.icns

      - name: Build application with PyInstaller
        env:
          PYI_ICON_PATH: ${{ github.workspace }}/build/icons/Asymmetry.icns
        shell: bash
        run: pyinstaller --clean --noconfirm packaging/asymmetry.spec

      - name: Smoke-test packaged app
        shell: bash
        run: |
          test -x dist/Asymmetry.app/Contents/MacOS/Asymmetry
          dist/Asymmetry.app/Contents/MacOS/Asymmetry --smoke-test

      - name: Install DMG packaging tool
        shell: bash
        run: brew install create-dmg

      - name: Build DMG
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          DMG_PATH="dist/Asymmetry-${VERSION}-macos-arm64.dmg"
          DMG_ROOT="build/dmg-root"
          DMG_BG="build/dmg-bg.png"

          test -d dist/Asymmetry.app

          rm -rf "$DMG_ROOT"
          mkdir -p "$DMG_ROOT"
          cp -R dist/Asymmetry.app "$DMG_ROOT/"

          python - <<'PY'
          import matplotlib
          matplotlib.use("Agg")
          import matplotlib.pyplot as plt

          fig = plt.figure(figsize=(8.0, 4.2), dpi=100)
          ax = fig.add_axes([0, 0, 1, 1])
          ax.set_xlim(0, 1)
          ax.set_ylim(0, 1)
          ax.axis("off")

          fig.patch.set_facecolor("#f6f6f6")
          ax.annotate(
              "",
              xy=(0.72, 0.50),
              xytext=(0.42, 0.50),
              arrowprops={"arrowstyle": "-|>", "lw": 6, "color": "#8a8a8a"},
          )
          ax.text(
              0.57,
              0.62,
              "Drag to Applications",
              ha="center",
              va="center",
              fontsize=15,
              color="#666666",
          )
          fig.savefig("build/dmg-bg.png", dpi=100)
          PY

          rm -f "$DMG_PATH"

          create-dmg \
            --volname "Asymmetry" \
            --background "$DMG_BG" \
            --window-pos 200 120 \
            --window-size 800 420 \
            --icon-size 100 \
            --icon "Asymmetry.app" 220 210 \
            --hide-extension "Asymmetry.app" \
            --app-drop-link 580 210 \
            "$DMG_PATH" \
            "$DMG_ROOT"

      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: asymmetry-macos-arm64
          path: dist/Asymmetry-${{ steps.meta.outputs.version }}-macos-arm64.dmg
          if-no-files-found: error

  build-windows:
    name: Build Windows installer (x64)
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version
        id: meta
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $version = $tag.Substring(1)
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints.txt -e ".[gui,gle,hdf5,root]"
          pip install -c constraints.txt pyinstaller Pillow

      - name: Generate Windows icon (.ico)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/icons | Out-Null
          python -c "from PIL import Image; img = Image.open('src/asymmetry/resources/logo_512x512.png'); img.save('build/icons/Asymmetry.ico', sizes=[(16,16),(24,24),(32,32),(48,48),(64,64),(128,128),(256,256)])"

      - name: Build application with PyInstaller
        env:
          PYI_ICON_PATH: ${{ github.workspace }}\build\icons\Asymmetry.ico
        shell: pwsh
        run: pyinstaller --clean --noconfirm packaging/asymmetry.spec

      - name: Smoke-test packaged app
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\Asymmetry\Asymmetry.exe")) {
            throw "Packaged executable not found at dist\\Asymmetry\\Asymmetry.exe"
          }
          & "dist\Asymmetry\Asymmetry.exe" --smoke-test

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Build NSIS installer
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.version }}"
          $distDir = "$env:GITHUB_WORKSPACE\dist\Asymmetry"
          $iconFile = "$env:GITHUB_WORKSPACE\build\icons\Asymmetry.ico"
          $outputFile = "$env:GITHUB_WORKSPACE\dist\Asymmetry-$version-windows-x64-setup.exe"

          $makensis = (Get-Command makensis -ErrorAction SilentlyContinue).Source
          if (-not $makensis) {
            $candidates = @(
              "$env:ProgramFiles\NSIS\makensis.exe",
              "${env:ProgramFiles(x86)}\NSIS\makensis.exe",
              "C:\ProgramData\chocolatey\bin\makensis.exe"
            )
            foreach ($candidate in $candidates) {
              if (Test-Path $candidate) {
                $makensis = $candidate
                break
              }
            }
          }
          if (-not $makensis) {
            throw "Unable to locate makensis.exe after NSIS installation"
          }

          & $makensis /V2 /DVERSION=$version /DDIST_DIR=$distDir /DICON_FILE=$iconFile /DOUTPUT_FILE=$outputFile packaging\installer.nsi

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: asymmetry-windows-x64
          path: dist/Asymmetry-${{ steps.meta.outputs.version }}-windows-x64-setup.exe
          if-no-files-found: error

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-macos-intel
      - build-macos-arm
      - build-windows
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.exe
