name: Preview build (macOS arm64)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: preview-macos-arm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos-arm:
    name: Build macOS DMG (arm64)
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Extract preview version
        id: meta
        shell: bash
        run: |
          BASE_VERSION=$(grep -E '^version = ' pyproject.toml | head -1 | sed 's/^version = "\(.*\)"/\1/')
          SHORT_SHA="${GITHUB_SHA::7}"
          PREVIEW_VERSION="${BASE_VERSION}-preview.${SHORT_SHA}"
          echo "version=${PREVIEW_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        shell: bash
        run: |
          brew install hdf4
          HDF4_PREFIX="$(brew --prefix hdf4)"
          python -m pip install --upgrade pip
          INCLUDE_DIRS="${HDF4_PREFIX}/include" LIBRARY_DIRS="${HDF4_PREFIX}/lib" \
            pip install -c constraints.txt -e ".[gui,gle,hdf5,hdf4,root]"
          pip install -c constraints.txt pyinstaller Pillow dmgbuild

      - name: Generate macOS icon (.icns)
        shell: bash
        run: python packaging/macos_icon.py --icns build/icons/Asymmetry.icns

      - name: Build application with PyInstaller
        env:
          PYI_ICON_PATH: ${{ github.workspace }}/build/icons/Asymmetry.icns
        shell: bash
        run: pyinstaller --clean --noconfirm packaging/asymmetry.spec

      - name: Smoke-test packaged app
        shell: bash
        run: |
          test -x dist/Asymmetry.app/Contents/MacOS/Asymmetry
          dist/Asymmetry.app/Contents/MacOS/Asymmetry --smoke-test --smoke-test-root

      - name: Generate DMG background
        shell: bash
        run: python scripts/build_dmg_background.py --output build/dmg-bg.png

      - name: Build DMG
        env:
          ASYMMETRY_APP_BUNDLE: ${{ github.workspace }}/dist/Asymmetry.app
          ASYMMETRY_DMG_BACKGROUND: ${{ github.workspace }}/build/dmg-bg.png
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          DMG_PATH="dist/Asymmetry-${VERSION}-macos-arm64.dmg"

          test -d dist/Asymmetry.app

          rm -f "$DMG_PATH"
          dmgbuild -s packaging/macos/dmg_settings.py "Asymmetry" "$DMG_PATH"

      - name: Upload macOS arm64 preview artifact
        uses: actions/upload-artifact@v7
        with:
          name: asymmetry-macos-arm64-preview
          path: dist/Asymmetry-${{ steps.meta.outputs.version }}-macos-arm64.dmg
          if-no-files-found: error
          # Preview builds are downloaded manually from the workflow run; a short
          # retention keeps Actions storage use low (default is 90 days).
          retention-days: 3
