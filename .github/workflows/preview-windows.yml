name: Preview build (Windows x64)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: preview-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Windows installer (x64)
    runs-on: windows-2025
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Extract preview version
        id: meta
        shell: pwsh
        run: |
          $line = Select-String -Path pyproject.toml -Pattern '^version = "' | Select-Object -First 1
          $baseVersion = $line.Line -replace '^version = "(.+)"', '$1'
          $shortSha = $env:GITHUB_SHA.Substring(0, 7)
          $previewVersion = "$baseVersion-preview.$shortSha"
          "version=$previewVersion" >> $env:GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints.txt -e ".[gui,gle,hdf5,hdf4,root]"
          pip install -c constraints.txt pyinstaller Pillow

      - name: Generate Windows icon (.ico)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/icons | Out-Null
          python -c "from PIL import Image; img = Image.open('src/asymmetry/resources/logo_512x512.png'); img.save('build/icons/Asymmetry.ico', sizes=[(16,16),(24,24),(32,32),(48,48),(64,64),(128,128),(256,256)])"

      - name: Stage HDF4 runtime DLLs
        shell: pwsh
        run: python packaging/windows/fetch_hdf4_dlls.py "$env:GITHUB_WORKSPACE\build\hdf4-dlls"

      - name: Build application with PyInstaller
        env:
          PYI_ICON_PATH: ${{ github.workspace }}\build\icons\Asymmetry.ico
          ASYMMETRY_HDF4_DLL_DIR: ${{ github.workspace }}\build\hdf4-dlls
        shell: pwsh
        run: pyinstaller --clean --noconfirm packaging/asymmetry.spec

      - name: Smoke-test packaged app
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\Asymmetry\Asymmetry.exe")) {
            throw "Packaged executable not found at dist\\Asymmetry\\Asymmetry.exe"
          }
          & "dist\Asymmetry\Asymmetry.exe" --smoke-test --smoke-test-root

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y

      - name: Build EXE installer
        shell: pwsh
        run: |
          $previewVersion = "${{ steps.meta.outputs.version }}"
          $appDir = "$env:GITHUB_WORKSPACE\dist\Asymmetry"
          $iconFile = "$env:GITHUB_WORKSPACE\build\icons\Asymmetry.ico"
          $outputDir = "$env:GITHUB_WORKSPACE\dist"
          $outputName = "Asymmetry-$previewVersion-windows-x64-setup"
          iscc `
            "/DAppVersion=$previewVersion" `
            "/DAppDir=$appDir" `
            "/DIconFile=$iconFile" `
            "/DOutputDir=$outputDir" `
            "/DOutputName=$outputName" `
            packaging\windows\asymmetry.iss

      - name: Upload Windows preview artifact
        uses: actions/upload-artifact@v7
        with:
          name: asymmetry-windows-x64-preview
          path: dist/Asymmetry-${{ steps.meta.outputs.version }}-windows-x64-setup.exe
          if-no-files-found: error
          # Preview builds are downloaded manually from the workflow run; a short
          # retention keeps Actions storage use low (default is 90 days).
          retention-days: 3
